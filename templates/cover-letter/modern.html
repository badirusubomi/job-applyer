<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="{{{fontImportUrl}}}" rel="stylesheet">
    <style>
        :root {
            --black: #000;
            --white: #fff;
            --accent: #e8fc3b;
            --primary-font: {{{fontFamily}}};
        }
        * {
            box-sizing: border-box;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }
        body {
            font-family: var(--primary-font), sans-serif;
            line-height: 1.35;
            color: var(--black);
            margin: 0;
            padding: 30px;
            background: var(--white);
            font-size: 12pt;
        }
        .header {
            border-bottom: 3px solid var(--black);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 26pt;
            margin: 0 0 5px 0;
            text-transform: titlecase;
            letter-spacing: -1px;
            line-height: 1;
        }
        .contact {
            text-transform: titlecase;
            font-weight: bold;
            font-size: 10pt;
            letter-spacing: 0.5px;
        }
        .date {
            margin-bottom: 15px;
            font-weight: bold;
        }
        .recipient {
            margin-bottom: 20px;
        }
        .content {
            white-space: pre-wrap;
            text-align: justify;
        }
        .signature {
            margin-top: 30px;
        }
        .sign-off {
            font-weight: bold;
            text-transform: titlecase;
            letter-spacing: 1px;
            font-size: 12pt;
        }
        .name {
            font-family: 'Playfair Display', serif;
            font-size: 16pt;
            margin-top: 8px;
            text-transform: titlecase;
        }
        @media print {
            body { padding: 0; background: transparent; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>{{name}}</h1>
        <div class="contact">
            {{contact.email}} &bull; {{contact.phone}} &bull; {{contact.location}}
        </div>
    </div>

    <div class="date">{{date}}</div>

    <div class="recipient">
        <strong>To The Hiring Team At {{company}}</strong><br>
        RE: {{role}}
    </div>

    <div class="content">{{body}}</div>

    <div class="signature">
        <div class="sign-off">Sincerely,</div>
        <div class="name">{{name}}</div>
    </div>
</body>
</html>
