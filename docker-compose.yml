services:
  # Local LLM service
  ollama:
    image: ollama/ollama
    container_name: ollama-service
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama
    restart: unless-stopped

  # Core Job Automation Application
  app:
    build: .
    container_name: job-automation-app
    ports:
      - "3000:3000"
    depends_on:
      - ollama
    environment:
      # Tell the app to look for the LLM container on the Docker network
      - OLLAMA_BASE_URL=http://ollama:11434
      # Default to a generic OpenAI endpoint if used externally
      - OPENAI_API_KEY=${OPENAI_API_KEY:-""}
    restart: always

# Persistent volumes for the LLM models
volumes:
  ollama_storage: