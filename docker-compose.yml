services:
  # Local LLM service
  ollama:
    image: ollama/ollama
    container_name: ollama-service
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama
    # AUTOMATIC BOOTSTRAP: Pull the model specified in .env on first launch!
    entrypoint: /bin/sh
    command: -c "ollama serve & sleep 10 && ollama pull llama3 && wait"
    restart: unless-stopped

  # Core Job Automation Application
  app:
    build: .
    container_name: job-automation-app
    ports:
      - "3000:3000"
    depends_on:
      - ollama
    # Automatically import all keys and secrets from the local .env file!
    env_file:
      - .env
    # We can still provide explicit overrides here for Docker-specific networking.
    environment:
      - LOCAL_LLM_URL=http://ollama:11434/v1
      - OLLAMA_BASE_URL=http://ollama:11434
    restart: always

# Persistent volumes for the LLM models
volumes:
  ollama_storage: